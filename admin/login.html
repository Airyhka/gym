<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Warriors Gym</title>
<link rel="stylesheet" href="admin.css">
</head>
<body class="login-page">
<div class="login-wrap">
  <div class="login-brand">
    <div>
      <div class="login-logo">WARRIORS<span>GYM</span></div>
      <p>Admin Panel</p>
      <p class="brand-desc">Kelola konten website Warriors Gym Surabaya. Semua perubahan tersimpan otomatis di browser.</p>
    </div>
    <div style="margin-top:auto;padding-top:40px;color:#333;font-size:.72rem;">
      © 2026 Warriors Gym · Surabaya
    </div>
  </div>
  <div class="login-card">
    <h1>Masuk ke Panel Admin</h1>
    <p class="login-sub">Masukkan kredensial untuk mengelola konten website.</p>
    <div id="loginError" class="login-error" style="display:none">Username atau password salah.</div>
    <div class="form-group" style="margin-bottom:14px">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        <button class="toggle-pw" id="togglePw" type="button">??</button>
      </div>
    </div>
    <button class="btn-login" id="loginBtn">Masuk</button>
    <p class="login-footer">Warriors Gym Admin Panel v1.0</p>
  </div>
</div>
<script>
const DEFAULT_HASH = "b44b843bc9e2f2a0f0a2dce2e2ce0a0bca17e79e0f748a3d3a0cfe9f1e5b2e4";
async function sha256(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
document.getElementById("togglePw").addEventListener("click",()=>{
  const pw = document.getElementById("password");
  pw.type = pw.type==="password" ? "text" : "password";
});
document.getElementById("loginBtn").addEventListener("click", async ()=>{
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const hash = await sha256(password);
  const stored = JSON.parse(localStorage.getItem("wg_admin_creds")||"null");
  const validUser = stored ? stored.username : "admin";
  const validHash = stored ? stored.passwordHash : await sha256("warriors2026");
  if(!stored){
    const defHash = await sha256("warriors2026");
    if(username==="admin" && hash===defHash){
      const session={token:crypto.randomUUID(),expires:Date.now()+8*3600*1000};
      sessionStorage.setItem("wg_admin_session",JSON.stringify(session));
      window.location.href="dashboard.html"; return;
    }
  } else {
    if(username===validUser && hash===validHash){
      const session={token:crypto.randomUUID(),expires:Date.now()+8*3600*1000};
      sessionStorage.setItem("wg_admin_session",JSON.stringify(session));
      window.location.href="dashboard.html"; return;
    }
  }
  document.getElementById("loginError").style.display="block";
});
document.getElementById("password").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("loginBtn").click();});
// redirect if already logged in
const s=JSON.parse(sessionStorage.getItem("wg_admin_session")||"null");
if(s && Date.now()<s.expires) window.location.href="dashboard.html";
</script>
</body>
</html>
